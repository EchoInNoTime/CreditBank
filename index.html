<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAGUER'S BANK - Credit Card Application</title>
    <style>
        /* Base Styles */
        body {
            background-color: #24574B;
            color: white;
            font-family: 'Platino', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }

        #app-container {
            width: 90%;
            max-width: 600px;
            padding: 20px;
        }

        /* Typography */
        h1.bank-name {
            font-family: 'Eternalo', serif;
            font-size: 2.5rem;
            margin-bottom: 20px;
            padding: 15px;
            border: 4px solid silver;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(192, 192, 192, 0.5), inset 0 0 10px rgba(192, 192, 192, 0.5);
            background: linear-gradient(145deg, #24574B, #1e493e);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .question-text {
            font-family: 'Platino Bold', 'Platino', sans-serif;
            font-weight: bold;
            font-size: 1.5rem;
            margin-bottom: 25px;
        }

        /* Layouts */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .screen.active {
            display: flex;
        }

        .question-box {
            border: 4px solid silver;
            border-radius: 8px;
            padding: 30px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 0 10px rgba(192, 192, 192, 0.5);
            background-color: rgba(0, 0, 0, 0.1);
        }

        /* Controls */
        input[type="text"] {
            padding: 10px;
            font-size: 1.2rem;
            width: 80%;
            margin-bottom: 20px;
            border-radius: 5px;
            border: none;
            font-family: 'Platino', sans-serif;
        }

        button {
            background-color: silver;
            color: #24574B;
            border: none;
            padding: 12px 25px;
            font-size: 1.2rem;
            font-family: 'Platino Bold', sans-serif;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            margin: 10px 0;
            width: 100%;
            max-width: 400px;
        }

        button:hover {
            background-color: white;
        }

        button:active {
            transform: scale(0.98);
        }

        .option-btn {
            background-color: transparent;
            color: white;
            border: 2px solid silver;
            text-align: left;
            font-family: 'Platino', sans-serif;
            font-weight: normal;
        }

        .option-btn:hover {
            background-color: rgba(192, 192, 192, 0.2);
            color: white;
        }

        /* Loading Animation */
        .progress-container {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin-top: 20px;
            overflow: hidden;
            border: 1px solid silver;
        }

        .progress-bar {
            width: 0%;
            height: 30px;
            background-color: silver;
            transition: width 0.1s linear;
        }

        .calculating-text {
            font-family: 'Platino Bold', sans-serif;
            font-size: 1.2rem;
            margin-top: 20px;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.6; }
            to { opacity: 1; }
        }

        /* Credit Card Design */
        .result-title {
            font-size: 1.8rem;
            font-family: 'Platino Bold', sans-serif;
            margin-bottom: 20px;
            color: silver;
        }

        .credit-limit {
            font-size: 1.5rem;
            margin-top: 25px;
            font-family: 'Platino Bold', sans-serif;
        }

        .declined-text {
            font-size: 3rem;
            color: #ff4d4d;
            font-weight: bold;
            border: 5px solid #ff4d4d;
            padding: 20px;
            transform: rotate(-10deg);
            margin: 40px 0;
        }

        .credit-card {
            width: 400px;
            height: 250px;
            border-radius: 15px;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            box-shadow: 0 15px 25px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            text-align: left;
            margin: 0 auto;
        }

        .card-bank {
            position: absolute;
            top: 20px;
            right: 20px;
            font-family: 'Eternalo', serif;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .card-chip {
            position: absolute;
            top: 90px;
            left: 30px;
            width: 50px;
            height: 35px;
            background: linear-gradient(135deg, #e6c27a, #d4af37, #997a00);
            border-radius: 5px;
            border: 1px solid rgba(0,0,0,0.2);
        }

        .card-chip::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            height: 1px;
            background: rgba(0,0,0,0.3);
            box-shadow: 0 14px 0 rgba(0,0,0,0.3);
        }

        .card-number {
            font-size: 1.6rem;
            letter-spacing: 3px;
            margin-bottom: 15px;
            font-family: monospace;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .card-name {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* Specific Card Themes */
        .card-white { background: #f0f0f0; color: #333; }
        .card-white .card-bank, .card-white .card-number, .card-white .card-name { text-shadow: none; color: #333; }
        .card-red-gray { background: linear-gradient(135deg, #a03030, #555555); color: white; }
        .card-purple { background: linear-gradient(135deg, #4b0082, #800080); color: white; }
        .card-light-blue { background: linear-gradient(135deg, #87ceeb, #4682b4); color: white; }
        .card-golden { background: linear-gradient(135deg, #ffd700, #b8860b); color: #333; }
        .card-golden .card-bank, .card-golden .card-number, .card-golden .card-name { text-shadow: none; }
        .card-platinum { background: linear-gradient(135deg, #e5e4e2, #b0c4de); color: #333; }
        .card-platinum .card-bank, .card-platinum .card-number, .card-platinum .card-name { text-shadow: none; }
        .card-black { background: linear-gradient(135deg, #2b2b2b, #000000); color: silver; }

        @media (max-width: 450px) {
            .credit-card { width: 100%; height: 200px; }
            .card-number { font-size: 1.2rem; }
            .card-chip { top: 70px; }
        }
    </style>
</head>
<body>

<div id="app-container">
    <h1 class="bank-name">DAGUER'S BANK</h1>

    <div id="welcome-screen" class="screen active">
        <h2>Welcome</h2>
        <button onclick="showNameScreen()">Get Started</button>
    </div>

    <div id="name-screen" class="screen">
        <div class="question-box">
            <div class="question-text">Please enter your name:</div>
            <input type="text" id="user-name-input" placeholder="Your Name" autocomplete="off">
            <button onclick="startQuiz()">Continue</button>
        </div>
    </div>

    <div id="question-screen" class="screen">
        <div class="question-box">
            <div id="question-text" class="question-text"></div>
            <div id="options-container"></div>
        </div>
    </div>

    <div id="loading-screen" class="screen">
        <div class="question-box">
            <div class="calculating-text">Calculating Credit Worthiness...</div>
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <div id="card-title" class="result-title"></div>
        <div id="card-container"></div>
        <div id="card-limit" class="credit-limit"></div>
    </div>

</div>

<script>
    // Variables
    let currentQuestionIndex = 0;
    let totalScore = 0;
    let userName = "";

    // Quiz Data
    const questions = [
        {
            q: "Gender",
            options: [
                { text: "Male", value: 1 },
                { text: "Female", value: 1 },
                { text: "Something woke", value: 2 }
            ]
        },
        {
            q: "What is your Annual Income?",
            options: [
                { text: "Invasion of privacy much?", value: -1 },
                { text: "More than a police officer", value: 2 },
                { text: "$50,000", value: -2 },
                { text: "I have a very generous aunt", value: 1 }
            ]
        },
        {
            q: "Do you already have an account with us?",
            options: [
                { text: "Yes", value: -1 },
                { text: "No", value: 1 },
                { text: "I’ve never heard of this prestigious institution before this", value: 2 },
                { text: "No (again)", value: -2 }
            ]
        },
        {
            q: "Why do you need this credit card?",
            options: [
                { text: "None of your business", value: 1 },
                { text: "My house is on the line and about to get repossessed", value: -2 },
                { text: "To show I care about the Core Values", value: 2 },
                { text: "To purchase whatever I want recklessly", value: -1 }
            ]
        },
        {
            q: "Your credit card declines for a pack of gum. Do you:",
            options: [
                { text: "Blame the machine and/or the cashier", value: -1 },
                { text: "Casually pull out a second card", value: 2 },
                { text: "Leave the store and never return", value: -2 },
                { text: "Say “Oh darn it, I’ll go put it back” then proceed to get out of the line and walk towards the back, put the gum in your pocket and leave the store", value: 1 }
            ]
        },
        {
            q: "What will be the first purchase you’ll make with this new plastic?",
            options: [
                { text: "A gift for my wife/husband", value: -1 },
                { text: "Food or the mortgage payment (I told you my hose is on the line)", value: -2 },
                { text: "I will be using this card for emergencies only", value: 2 },
                { text: "Again, none of your business, bro", value: 1 }
            ]
        },
        {
            q: "Your statement balance is $500. You pay $499. How do you feel?",
            options: [
                { text: "Financially responsible", value: 1 },
                { text: "Like a genius who gained the system", value: -1 },
                { text: "Annoyed that you couldn’t find another 99 cents under the couch", value: 2 },
                { text: "Proud that you left $1 just to remind the bank who’s in charge", value: -2 }
            ]
        },
        {
            q: "Favorite thing about Yehuda",
            options: [
                { text: "His facy face", value: -1 },
                { text: "His professionalism", value: 2 },
                { text: "His work ethic", value: 1 },
                { text: "Not really my cup of tea that guy…", value: -2 }
            ]
        },
        {
            q: "What is the capital of Paraguay?",
            options: [
                { text: "Montevideo", value: -1 },
                { text: "Asuncion", value: 2 },
                { text: "La Paz", value: -2 },
                { text: "What is a Paraguay", value: 1 }
            ]
        },
        {
            q: "Samuel Daguer´s favorite brand is…",
            options: [
                { text: "Samuel Heath", value: -1 },
                { text: "Rubinet", value: 2 },
                { text: "Phylrich", value: -2 },
                { text: "Gessi", value: 2 }
            ]
        },
        {
            q: "In Cuernavaca, license plates are formatted with 3 letters and 4 numbers (for example: AAA-####). The letters I, Q, O and X are excluded, and letters A and E can’t be used in the second position. How many license combinations are there?",
            options: [
                { text: "25,500,000", value: -1 },
                { text: "A lot", value: 1 },
                { text: "96,800,000", value: 2 },
                { text: "At least 5", value: -2 }
            ]
        }
    ];

    // Navigation Functions
    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function showNameScreen() {
        switchScreen('name-screen');
    }

    function startQuiz() {
        const nameInput = document.getElementById('user-name-input').value.trim();
        if (nameInput === "") {
            alert("Please enter your name to continue.");
            return;
        }
        userName = nameInput;
        currentQuestionIndex = 0;
        totalScore = 0;
        renderQuestion();
        switchScreen('question-screen');
    }

    function renderQuestion() {
        const qData = questions[currentQuestionIndex];
        document.getElementById('question-text').innerText = qData.q;
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = ''; // Clear previous

        qData.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => selectOption(opt.value);
            optionsContainer.appendChild(btn);
        });
    }

    function selectOption(value) {
        totalScore += value;
        currentQuestionIndex++;
        
        if (currentQuestionIndex < questions.length) {
            renderQuestion();
        } else {
            startLoading();
        }
    }

    // Loading Animation
    function startLoading() {
        switchScreen('loading-screen');
        const progressBar = document.getElementById('progress-bar');
        let width = 0;
        
        const interval = setInterval(() => {
            width += 2;
            progressBar.style.width = width + '%';
            
            if (width >= 100) {
                clearInterval(interval);
                setTimeout(showResult, 500);
            }
        }, 50); // 2.5 seconds total
    }

    // Result Calculation & Display
    function generateRandomCardNumber() {
        let num = "";
        for(let i=0; i<4; i++) {
            num += Math.floor(1000 + Math.random() * 9000);
            if(i < 3) num += " ";
        }
        return num;
    }

    function showResult() {
        switchScreen('result-screen');
        
        const cardTitle = document.getElementById('card-title');
        const cardContainer = document.getElementById('card-container');
        const cardLimit = document.getElementById('card-limit');
        
        let cardName = "";
        let creditLimit = "";
        let cardClass = "";

        // Determine outcome based on score
        if (totalScore <= -17) {
            // Worst 3 scores (-19, -18, -17)
            cardTitle.innerText = "";
            cardLimit.innerText = "";
            cardContainer.innerHTML = `<div class="declined-text">DECLINED</div>`;
            return;
        } else if (totalScore >= -16 && totalScore <= -14) {
            cardName = "At Least You Tried";
            cardClass = "card-white";
            creditLimit = "$250";
        } else if (totalScore >= -13 && totalScore <= -8) {
            cardName = "Better Than Nothing";
            cardClass = "card-red-gray";
            creditLimit = "$500";
        } else if (totalScore >= -7 && totalScore <= -2) {
            cardName = "Almost Positive Score";
            cardClass = "card-purple";
            creditLimit = "$750";
        } else if (totalScore >= -1 && totalScore <= 4) {
            cardName = "Positive Score";
            cardClass = "card-light-blue";
            creditLimit = "$1,250";
        } else if (totalScore >= 5 && totalScore <= 10) {
            cardName = "Golden Core Values";
            cardClass = "card-golden";
            creditLimit = "$5,000";
        } else if (totalScore >= 11 && totalScore <= 16) {
            cardName = "Brushed Platinum";
            cardClass = "card-platinum";
            creditLimit = "$100,000";
        } else if (totalScore >= 17) {
            cardName = "Ultra Mega Wow Gun Metal Black";
            cardClass = "card-black";
            creditLimit = "$1,000,000";
        }

        cardTitle.innerText = cardName;
        cardLimit.innerText = "Credit Limit: " + creditLimit;
        
        const randomNum = generateRandomCardNumber();
        
        cardContainer.innerHTML = `
            <div class="credit-card ${cardClass}">
                <div class="card-bank">DAGUER'S BANK</div>
                <div class="card-chip"></div>
                <div class="card-number">${randomNum}</div>
                <div class="card-name">${userName}</div>
            </div>
        `;
    }
</script>

</body>
</html>
