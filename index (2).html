<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAGUER'S BANK - Credit Assessment</title>
    <style>
        /* Import Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

        /* Font Assignments as specified */
        /* Eternalo substitution: Cinzel (Classic Serif) */
        /* Platino Bold substitution: Playfair Display Bold */
        /* Platino substitution: Playfair Display Regular */

        :root {
            --bg-color: #24574B;
            --gold-color: #D4AF37;
            --gold-bright: #FFD700;
            --text-light: #F5F5F5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            font-family: 'Playfair Display', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Header / Bank Name Style */
        header {
            margin-bottom: 40px;
            text-align: center;
        }

        .bank-title {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            color: var(--gold-color);
            padding: 15px 40px;
            border: 3px double var(--gold-color);
            letter-spacing: 4px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            background-color: rgba(15, 43, 36, 0.6);
            display: inline-block;
        }

        /* Main Container for Screens */
        .container {
            width: 100%;
            max-width: 650px;
            min-height: 400px;
            position: relative;
        }

        /* Question and Result Boxes */
        .screen {
            background-color: rgba(18, 48, 41, 0.9);
            border: 2px solid var(--gold-bright);
            border-radius: 4px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            display: none; /* Hidden by default */
            width: 100%;
            animation: fadeIn 0.5s ease forward;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Typography */
        h2.question-text {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.6rem;
            line-height: 1.4;
            margin-bottom: 30px;
            color: #FFFFFF;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 15px;
        }

        /* Inputs and Options */
        .input-group {
            margin-top: 20px;
        }

        .text-input {
            width: 100%;
            padding: 15px;
            background-color: rgba(255,255,255,0.05);
            border: 1px solid var(--gold-color);
            color: #FFF;
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            outline: none;
            transition: all 0.3s;
        }

        .text-input:focus {
            background-color: rgba(255,255,255,0.1);
            border-color: var(--gold-bright);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
        }

        .options-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-item {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.4);
            padding: 16px 20px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
        }

        .option-item:hover {
            background-color: rgba(212, 175, 55, 0.15);
            border-color: var(--gold-bright);
            transform: translateX(5px);
        }

        /* Navigation Buttons */
        .btn-container {
            margin-top: 30px;
            display: flex;
            justify-content: flex-end;
        }

        .next-btn {
            background-color: transparent;
            color: var(--gold-color);
            border: 1px solid var(--gold-color);
            padding: 12px 35px;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s;
        }

        .next-btn:hover {
            background-color: var(--gold-color);
            color: var(--bg-color);
            font-weight: bold;
        }

        /* Loading Screen Assets */
        .loader-content {
            text-align: center;
            padding: 20px 0;
        }

        /* CSS Accountant Working Animation */
        .accountant-animation {
            width: 120px;
            height: 100px;
            margin: 0 auto 35px auto;
            position: relative;
        }
        
        .computer {
            width: 70px;
            height: 45px;
            border: 3px solid var(--gold-color);
            border-radius: 4px;
            position: absolute;
            bottom: 20px;
            left: 25px;
            background: #123029;
        }
        .computer::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 20px;
            width: 24px;
            height: 6px;
            background: var(--gold-color);
        }

        .accountant-hands {
            position: absolute;
            bottom: 5px;
            left: 30px;
            width: 50px;
            height: 10px;
            display: flex;
            justify-content: space-around;
        }

        .hand {
            width: 8px;
            height: 8px;
            background: #e0b088;
            border-radius: 50%;
            animation: typing 0.2s infinite alternate;
        }
        .hand.right { animation-delay: 0.1s; }

        @keyframes typing {
            from { transform: translateY(0); }
            to { transform: translateY(-8px); }
        }

        .loading-text {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: var(--gold-color);
        }

        /* Progress Bar Setup */
        .progress-container {
            width: 100%;
            height: 6px;
            background-color: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background-color: var(--gold-bright);
            transition: width 0.1s linear;
        }

        /* Credit Card Results Displays */
        .card-result-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        .card-title-top {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            color: #FFF;
            text-align: center;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* Base Physical Card Object Wrapper */
        .credit-card {
            width: 400px;
            height: 250px;
            border-radius: 15px;
            padding: 25px;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 0 1px 2px rgba(255,255,255,0.2);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: #000;
            font-family: monospace; /* Standard EMV Card Font Style */
            text-shadow: 1px 1px 1px rgba(255,255,255,0.3);
        }

        /* EMV Chip Layout positioning */
        .emv-chip {
            width: 50px;
            height: 38px;
            background: linear-gradient(135deg, #dfb76c 0%, #c29b47 44%, #dfb76c 100%);
            border-radius: 6px;
            position: absolute;
            top: 75px;
            left: 30px;
            border: 1px solid rgba(0,0,0,0.2);
        }

        .card-bank-name {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-align: right;
            font-weight: bold;
        }

        .card-number {
            font-size: 1.4rem;
            letter-spacing: 3px;
            margin-top: auto;
            margin-bottom: 15px;
            white-space: nowrap;
        }

        .card-holder {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Credit Limit Display Typography */
        .credit-limit-display {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--gold-color);
            margin-top: 15px;
            text-align: center;
        }

        .credit-limit-display span {
            color: #FFF;
            font-weight: bold;
        }

        /* Dynamic Card Design Styles */
        .card-declined {
            background: #111;
            border: 2px dashed #cc0000;
            color: #cc0000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            text-shadow: none;
        }

        .card-plain-white {
            background: #FFFFFF;
            color: #333;
            border: 1px solid #ddd;
            text-shadow: none;
        }

        .card-turquoise-white {
            background: linear-gradient(135deg, #40E0D0 0%, #FFFFFF 100%);
            color: #222;
        }

        .card-yellow-green {
            background: linear-gradient(135deg, #FFD700 0%, #228B22 100%);
            color: #FFF;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .card-red-yellow {
            background: linear-gradient(135deg, #FF4500 0%, #FFD700 100%);
            color: #FFF;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .card-purple {
            background: linear-gradient(135deg, #4B0082 0%, #8A2BE2 100%);
            color: #FFF;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
        }

        .card-gold {
            background: linear-gradient(135deg, #BF953F 0%, #FCF6BA 25%, #B38728 50%, #FBF5B7 75%, #AA771C 100%);
            color: #4A3B18;
            border: 1px solid #AA771C;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.5);
        }

        .card-platinum-brushed {
            background: linear-gradient(135deg, #f0f0f0 0%, #dbdbdb 50%, #cccccc 55%, #f2f2f2 100%);
            color: #333;
            border: 1px solid #aaa;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 0 0 20px rgba(255,255,255,0.8);
        }

        .card-black-gunmetal {
            background: linear-gradient(135deg, #0d0d0d 0%, #262626 50%, #1a1a1a 100%);
            color: #d4af37;
            border: 1px solid #333;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.8);
        }
        .card-black-gunmetal .card-bank-name { color: #d4af37; }

        /* Responsive scaling for card preview */
        @media(max-width: 450px) {
            .credit-card {
                width: 320px;
                height: 200px;
                padding: 15px;
            }
            .card-number { font-size: 1.1rem; }
            .emv-chip { top: 60px; width: 40px; height: 30px; }
            h2.question-text { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="bank-title">DAGUER'S BANK</div>
    </header>

    <div class="container">
        <!-- Question Screens generated dynamically by JS -->
        <div id="quiz-container"></div>

        <!-- Animated Loading Processor Screen -->
        <div id="loading-screen" class="screen">
            <div class="loader-content">
                <div class="accountant-animation">
                    <div class="computer"></div>
                    <div class="accountant-hands">
                        <div class="hand left"></div>
                        <div class="hand right"></div>
                    </div>
                </div>
                <div class="loading-text">Analyzing Risk Portfolio...</div>
                <div class="progress-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
            </div>
        </div>

        <!-- Final Decision Result Screen -->
        <div id="result-screen" class="screen">
            <div class="card-result-container" id="result-payload">
                <!-- Content injected dynamically via script -->
            </div>
        </div>
    </div>

    <script>
        // Formatted structured questions keeping every string exactly literal
        const quizData = [
            {
                type: "input",
                question: "Enter your name"
            },
            {
                type: "options",
                question: "Gender (Add 3 boxes for the options)",
                options: [
                    { text: "Male", val: 1 },
                    { text: "Female", val: 1 },
                    { text: "Something Woke", val: 2 }
                ]
            },
            {
                type: "options",
                question: "Do you have an existing account with this bank?",
                options: [
                    { text: "Yes", val: -1 },
                    { text: "No", val: 1 },
                    { text: "Never heard of this prestigious institution before", val: 2 },
                    { text: "No (again)", val: -2 }
                ]
            },
            {
                type: "options",
                question: "Why do you need this credit card?",
                options: [
                    { text: "None of your business", val: 1 },
                    { text: "My house is on the line and about to get repossessed", val: -2 },
                    { text: "To show I care about the Core Values", val: 2 },
                    { text: "To make reckless purchases", val: -1 }
                ]
            },
            {
                type: "options",
                question: "What is your race?",
                options: [
                    { text: "White", val: 1 },
                    { text: "Black", val: -2 },
                    { text: "Latinx", val: -1 },
                    { text: "This question is illegal", val: 2 }
                ]
            },
            {
                type: "options",
                question: "Where do you lie in the political spectrum?",
                options: [
                    { text: "Far Left", val: 1 },
                    { text: "Left", val: 2 },
                    { text: "Center", val: 0 },
                    { text: "Right", val: -1 },
                    { text: "Far Right", val: -2 }
                ]
            },
            {
                type: "options",
                question: "What is the capital of Paraguay?",
                options: [
                    { text: "Montevideo", val: -1 },
                    { text: "Asuncion", val: 2 }, // Account for lowercase 'v' in string request
                    { text: "La Paz", val: -1 },
                    { text: "What is a Paraguay?", val: 1 }
                ]
            },
            {
                type: "options",
                question: "What is going to be your first purchase with this new plastic?",
                options: [
                    { text: "A gift for my wife/husband?", val: -1 },
                    { text: "Food for myself, or the mortgage payment (I told you my house is on the line)", val: -2 },
                    { text: "I plan on using this card for emergencies only", val: 2 },
                    { text: "Again, none of your business", val: 1 }
                ]
            },
            {
                type: "options",
                question: "What is your favorite thing about Yehuda?",
                options: [
                    { text: "His facy face", val: -1 },
                    { text: "His professionalism", val: 2 },
                    { text: "His work ethic", val: 1 },
                    { text: "Not really my cup of tea that guy", val: -2 }
                ]
            },
            {
                type: "options",
                question: "What brand is your car?",
                options: [
                    { text: "I don’t have a car ☹", val: -1 },
                    { text: "A Dodge", val: -2 },
                    { text: "I use my bike", val: 2 },
                    { text: "Obviously, something better, is not like I work in the Mexico office", val: 1 }
                ]
            },
            {
                type: "options",
                question: "Samuel D’s favorite brand is…",
                options: [
                    { text: "Samuel Heath", val: -1 },
                    { text: "Rubinet", val: 2 },
                    { text: "Phylrich", val: -2 },
                    { text: "Gessi", val: 1 }
                ]
            },
            {
                type: "options",
                question: "In Cuernavaca. Licensed Plates are formatted with 3 letters and 4 numbers (for example: AAA-####). The letters i, q, o and x are excluded, and letters a and e can’t be used in the second position. How many combinations are there?",
                options: [
                    { text: "21,500,000", val: -1 },
                    { text: "A lot", val: 1 },
                    { text: "96,800,000", val: 2 },
                    { text: "At least 2", val: -2 }
                ]
            }
        ];

        let currentStep = 0;
        let totalScore = 0;
        let applicantName = "Valued Client";

        const quizContainer = document.getElementById('quiz-container');

        // Dynamic Component Engine Initialization
        function buildQuiz() {
            quizData.forEach((step, index) => {
                const screenDiv = document.createElement('div');
                screenDiv.className = `screen ${index === 0 ? 'active' : ''}`;
                screenDiv.id = `step-${index}`;

                const qText = document.createElement('h2');
                qText.className = 'question-text';
                qText.innerText = step.question;
                screenDiv.appendChild(qText);

                if (step.type === 'input') {
                    const inputGroup = document.createElement('div');
                    inputGroup.className = 'input-group';
                    
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.className = 'text-input';
                    input.placeholder = "Enter your full name legal profile";
                    input.id = 'applicant-name-field';
                    
                    inputGroup.appendChild(input);
                    screenDiv.appendChild(inputGroup);

                    // Frame Button
                    const btnContainer = document.createElement('div');
                    btnContainer.className = 'btn-container';
                    const nextBtn = document.createElement('button');
                    nextBtn.className = 'next-btn';
                    nextBtn.innerText = 'PROCEED';
                    nextBtn.onclick = () => {
                        const val = document.getElementById('applicant-name-field').value.trim();
                        if(val !== "") applicantName = val;
                        navigateNext(0);
                    };
                    btnContainer.appendChild(nextBtn);
                    screenDiv.appendChild(btnContainer);

                } else if (step.type === 'options') {
                    const optionsList = document.createElement('ul');
                    optionsList.className = 'options-list';

                    step.options.forEach(opt => {
                        const optItem = document.createElement('li');
                        optItem.className = 'option-item';
                        optItem.innerText = opt.text;
                        optItem.onclick = () => navigateNext(opt.val);
                        optionsList.appendChild(optItem);
                    });

                    screenDiv.appendChild(optionsList);
                }

                quizContainer.appendChild(screenDiv);
            });
        }

        function navigateNext(scoreValue) {
            totalScore += scoreValue;
            
            // Hide current screen
            document.getElementById(`step-${currentStep}`).classList.remove('active');
            currentStep++;

            if (currentStep < quizData.length) {
                // Show next interactive screen
                document.getElementById(`step-${currentStep}`).classList.add('active');
            } else {
                // Processing animation window trigger
                triggerLoader();
            }
        }

        function triggerLoader() {
            const loadScreen = document.getElementById('loading-screen');
            const progressBar = document.getElementById('progress-bar');
            loadScreen.classList.add('active');

            let width = 0;
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    loadScreen.classList.remove('active');
                    renderCreditResult();
                } else {
                    width += 2.5; // Controls evaluation resolution speed (approx 4 seconds)
                    progressBar.style.width = width + '%';
                }
            }, 100);
        }

        // Helper random card number sequence generator starting with required code
        function generateCardNumbers() {
            let result = "0111 ";
            for (let i = 0; i < 3; i++) {
                let segment = Math.floor(1000 + Math.random() * 9000).toString();
                result += segment + (i < 2 ? " " : "");
            }
            return result;
        }

        function renderCreditResult() {
            const resultScreen = document.getElementById('result-screen');
            const target = document.getElementById('result-payload');
            resultScreen.classList.add('active');

            let cardName = "";
            let cardClass = "";
            let creditLimit = "";
            let isDeclined = false;

            // Strict Metric Logic Engine Tier Mapping
            if (totalScore >= -19 && totalScore <= -17) {
                isDeclined = true;
            } else if (totalScore >= -16 && totalScore <= -14) {
                cardName = "At Least Is Something Card";
                cardClass = "card-plain-white";
                creditLimit = "$500";
            } else if (totalScore >= -13 && totalScore <= -8) {
                cardName = "Participation Blue Card";
                cardClass = "card-turquoise-white";
                creditLimit = "$1,000";
            } else if (totalScore >= -7 && totalScore <= -2) {
                cardName = "Secure Start Card";
                cardClass = "card-yellow-green";
                creditLimit = "$1,750";
            } else if (totalScore >= -1 && totalScore <= 4) {
                cardName = "Foundation One Card";
                cardClass = "card-red-yellow";
                creditLimit = "$2,000";
            } else if (totalScore >= 5 && totalScore <= 10) {
                cardName = "StepUp Card";
                cardClass = "card-purple";
                creditLimit = "$55,000";
            } else if (totalScore >= 11 && totalScore <= 16) {
                cardName = "Gold Reserve Card";
                cardClass = "card-gold";
                creditLimit = "$100,000";
            } else if (totalScore >= 17 && totalScore <= 19) {
                cardName = "Brushed Platinum Card";
                cardClass = "card-platinum-brushed";
                creditLimit = "$1,000,000";
            } else if (totalScore >= 20 && totalScore <= 22) {
                cardName = "Platinum Black Gun Metal Ultra Mega Wow Card";
                cardClass = "card-black-gunmetal";
                creditLimit = "$2,000,000";
            }

            if (isDeclined) {
                target.innerHTML = `
                    <div class="card-title-top">APPLICATION STATUS</div>
                    <div class="credit-card card-declined">
                        DECLINED
                    </div>
                    <div class="credit-limit-display">Risk metrics outside parameters for matching account models.</div>
                `;
            } else {
                target.innerHTML = `
                    <div class="card-title-top">${cardName}</div>
                    <div class="credit-card ${cardClass}">
                        <div class="card-bank-name">DAGUER'S BANK</div>
                        <div class="emv-chip"></div>
                        <div class="card-number">${generateCardNumbers()}</div>
                        <div class="card-holder">${applicantName}</div>
                    </div>
                    <div class="credit-limit-display">Available Credit Limit: <span>${creditLimit}</span></div>
                `;
            }
        }

        // Initialize App on load
        window.onload = buildQuiz;
    </script>
</body>
</html>
